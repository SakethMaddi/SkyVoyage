<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="nav_Bar">
        <a href="./index.html" class="header_logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b10b2" stroke-width="2.625" stroke-linecap="round" stroke-linejoin="round" class="lucide_plane"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
        <span>SkyVoyage</span>
        </a>
        <div class="head_menu">
        <a href="" class="h_menu active">Login</a>
        <a href="./signup.html" class="h_menu">Sign Up</a>
        <button id="logoutBtn" > Logout</button>
      </div>
    </nav>
    </header>
    <main>
        <div class="login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue your journey ✈️</p>
        <form id="loginForm">
            <div class="form-group">
            <p>Email</p>
            <input type="email" id="loginEmail" required>
            </div>

            <div class="form-group">
            <p>Password</p>
            <input type="password" id="loginPassword" required>
            </div>

            <button type="submit" class="login-btn">
            Login
            </button>

            <p id="loginError" class="error-msg"></p>

        </form>
        <p class="switch-link">
            Don’t have an account?
            <a href="signup.html">Sign Up</a>
        </p>

        </div>
    </main>
</body>
<script src="js/login.js"></script>
</html>
